<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
  <h1>Student Expense Tracker</h1>

  <!-- Expense Form -->
  <form id="expense-form">
    <input type="text" id="title" placeholder="Expense title" required>
    <input type="number" id="amount" placeholder="Amount" required>
    <input type="text" id="category" list="category-options" placeholder="Select" required>
    <datalist id="category-options">
      <option value="Food">
      <option value="Travel">
        <option value="Clothes">
        </datalist>
   <button type="submit">Add Expense</button>
  </form>
  < a href="#viewchanges"> View Changes </a>
    
  <!-- Expense List -->
  <div class="view-changes" id="viewchanges">
  <ul id="expense-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
